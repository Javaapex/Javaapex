services:
  - type: keyvalue
    name: redis-connection
    plan: free
    region: singapore
    ipAllowList: []
    maxmemoryPolicy: noeviction
  - type: web
    name: java-apex-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: WORK_DIR
        value: /tmp/migrations
      - key: LOCAL_PROJECTS_ENABLED
        value: "true"
      - key: LOCAL_PROJECT_ALLOW_ANY_PATH
        value: "false"
      - key: LOCAL_PROJECT_ALLOWED_ROOTS
        value: /tmp,/tmp/migrations
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: redis-connection
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: FRONTEND_ORIGIN
        value: https://java-apex-accelerator.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://java-apex-accelerator.onrender.com
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEESEEK_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FOSSA_API_KEY
        sync: false
      - key: REPO_ANALYSIS_MAX_JAVA_FILES
        value: "10000"
      - key: REPO_ANALYSIS_MAX_ENDPOINT_FILES
        value: "2000"
      - key: REPO_FILE_CONTENT_MAX_BYTES
        value: "524288"
      - key: SONAR_HOST_URL
        value: https://sonarcloud.io
      - key: SONAR_TOKEN
        sync: false
      - key: SONAR_ORGANIZATION
        sync: false
      - key: SONAR_SCANNER_PATH
        value: /usr/local/bin/sonar-scanner
      - key: SONAR_ALLOW_SIMULATED_FALLBACK
        value: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
